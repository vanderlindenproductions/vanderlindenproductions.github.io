<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Call Records — Private Access</title>
<style>
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
         background:#101418; font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; padding:20px; }
  .card { background:#171d24; border:1px solid #232c36; border-radius:10px; padding:38px 34px 30px; width:100%; max-width:400px; }
  h1 { font-family:Georgia,serif; font-size:21px; font-weight:600; color:#dce6f0; margin:0 0 6px; }
  .brand { font-family:ui-monospace,Menlo,monospace; font-size:10.5px; letter-spacing:.14em;
           text-transform:uppercase; color:#e8a33d; margin:0 0 8px; }
  .sub { font-size:13px; color:#7d8a99; margin:0 0 24px; }
  label { font-family:ui-monospace,Menlo,monospace; font-size:10.5px; letter-spacing:.12em; text-transform:uppercase;
          color:#7d8a99; display:block; margin-bottom:6px; }
  input { width:100%; box-sizing:border-box; font-size:16px; padding:12px 13px; border:2px solid #232c36; border-radius:6px;
          background:#101418; color:#dce6f0; }
  input:focus { outline:none; border-color:#e8a33d; }
  button { width:100%; margin-top:14px; font-family:ui-monospace,Menlo,monospace; font-size:12px; letter-spacing:.1em;
           text-transform:uppercase; font-weight:700; background:#e8a33d; color:#101418; border:none;
           border-radius:6px; padding:13px; cursor:pointer; }
  button[disabled] { opacity:.6; cursor:wait; }
  .err { color:#ff8fa3; font-size:13px; min-height:18px; margin-top:12px; }
  .foot { margin-top:22px; font-size:11px; color:#7d8a99; text-align:center; }
</style>
</head>
<body>

  <p class="brand">VanDerLinden Productions</p>
  <h1>Call Records</h1>
  <p class="sub">Private access — enter the passphrase to unlock.</p>
  <form id="f">
    <label for="pw">Passphrase</label>
    <input id="pw" type="password" autocomplete="current-password" autofocus required />
    <button id="go" type="submit">Unlock</button>
    <div class="err" id="err" role="alert"></div>
  </form>
  <p class="foot">Encrypted in your browser — nothing readable without the passphrase.</p>
</main>

const enc = new TextEncoder(), dec = new TextDecoder();
function b64buf(s){ return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }
async function deriveKey(pass){
  const km = await crypto.subtle.importKey("raw", enc.encode(pass), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt:SALT, iterations:310000, hash:"SHA-256"}, km,
    {name:"AES-GCM", length:256}, true, ["decrypt"]);
}
async function unlockWith(key){
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:IV}, key, b64buf(CT_B64));
  const html = dec.decode(pt);
  try { localStorage.setItem("cr-gate-key", btoa(String.fromCharCode(...new Uint8Array(await crypto.subtle.exportKey("raw", key))))); } catch(e){}
  document.open(); document.write(html); document.close();
}
(async () => {
  const cached = localStorage.getItem("cr-gate-key");
  if (!cached) return;
  try {
    const key = await crypto.subtle.importKey("raw", b64buf(cached), {name:"AES-GCM"}, true, ["decrypt"]);
    await unlockWith(key);
  } catch(e) { localStorage.removeItem("cr-gate-key"); }
})();
document.getElementById("f").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  const btn = document.getElementById("go"), err = document.getElementById("err");
  btn.disabled = true; err.textContent = "";
  try {
    const key = await deriveKey(document.getElementById("pw").value);
    await unlockWith(key);
  } catch(e) {
    err.textContent = "Wrong passphrase — try again.";
    btn.disabled = false;
    document.getElementById("pw").select();
  }
});
