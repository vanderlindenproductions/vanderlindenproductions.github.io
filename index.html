const enc = new TextEncoder(), dec = new TextDecoder();
function b64buf(s){ return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }
async function deriveKey(pass){
  const km = await crypto.subtle.importKey("raw", enc.encode(pass), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt:SALT, iterations:310000, hash:"SHA-256"}, km,
    {name:"AES-GCM", length:256}, true, ["decrypt"]);
}
async function unlockWith(key){
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:IV}, key, b64buf(CT_B64));
  const html = dec.decode(pt);
  try { localStorage.setItem("ih-gate-key", btoa(String.fromCharCode(...new Uint8Array(await crypto.subtle.exportKey("raw", key))))); } catch(e){}
  document.open(); document.write(html); document.close();
}
(async () => {
  const cached = localStorage.getItem("ih-gate-key");
  if (!cached) return;
  try {
    const key = await crypto.subtle.importKey("raw", b64buf(cached), {name:"AES-GCM"}, true, ["decrypt"]);
    await unlockWith(key);
  } catch(e) { localStorage.removeItem("ih-gate-key"); }
})();
document.getElementById("f").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  const btn = document.getElementById("go"), err = document.getElementById("err");
  btn.disabled = true; err.textContent = "";
  try {
    const key = await deriveKey(document.getElementById("pw").value);
    await unlockWith(key);
  } catch(e) {
    err.textContent = "Wrong passphrase — try again.";
    btn.disabled = false;
    document.getElementById("pw").select();
  }
});
